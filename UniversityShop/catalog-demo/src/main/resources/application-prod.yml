# ================================================================
#  PERFIL: prod (MongoDB Atlas)
#  Vista de Despliegue: nodo "MongoDB Atlas Cluster"
# ================================================================
#  Usar cuando: despliegue en producción / CI
#  Activar con: SPRING_PROFILES_ACTIVE=prod
#  Requiere: export MONGODB_URI="mongodb+srv://user:pass@cluster.mongodb.net/..."
# ================================================================

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: catalog_demo
      auto-index-creation: false

  jackson:
    time-zone: UTC
    date-format: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX"
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# CORS: definir FRONTEND_URL en el entorno del servidor
app:
  cors:
    allowed-origins:
      - ${FRONTEND_URL:https://frontend.example.com}